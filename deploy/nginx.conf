# deploy/nginx.conf
#
# Reverse proxy for the docker-compose stack:
#   /auth/*  -> backend:4000
#   /api/*   -> backend:4000
#   else     -> frontend:3000

worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # Allow streaming large objects through /api/file without buffering them on
  # disk. We bump body size to accommodate the multipart upload payloads
  # (base64-encoded parts).
  client_max_body_size 50m;
  proxy_request_buffering off;
  proxy_buffering off;
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;

  # Lightweight access log to stdout for docker.
  access_log /var/log/nginx/access.log combined;
  error_log  /var/log/nginx/error.log warn;

  upstream backend {
    server backend:4000;
  }
  upstream frontend {
    server frontend:3000;
  }

  server {
    listen 80;
    server_name _;

    # Health
    location = /healthz {
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # API + auth -> backend
    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
    }

    location /auth/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
    }

    # Everything else -> Next.js
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
